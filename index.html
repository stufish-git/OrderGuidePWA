<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Order Guide">
  <title>Order Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loader-wordmark">Order<em>Guide</em></div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Print header (visible only when printing) -->
  <div id="print-hdr">
    <h1>Order Guide</h1>
    <p id="print-meta"></p>
  </div>

  <!-- Header -->
  <header>
    <div class="wordmark">Order<em>Guide</em></div>
    <div class="sync-chip">
      <div class="sync-pip" id="sync-pip"></div>
      <span id="sync-label">Loading</span>
    </div>
    <div class="hdr-gap"></div>
    <button class="pill" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print
    </button>
    <button class="pill pill-solid" id="refresh-btn" onclick="refreshData()">
      <svg id="refresh-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </header>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Toolbar -->
  <div class="toolbar">

    <!-- Area toggle -->
    <div class="seg">
      <button class="seg-btn active" data-area="all"     onclick="setArea('all')">All</button>
      <button class="seg-btn"        data-area="bar"     onclick="setArea('bar')">Bar</button>
      <button class="seg-btn"        data-area="kitchen" onclick="setArea('kitchen')">Kitchen</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search products, codes, suppliers..."
        oninput="onSearch(this.value)">
    </div>

    <!-- Supplier filter -->
    <div class="filter-wrap" id="fw-supplier">
      <button class="filter-pill" id="fp-supplier" onclick="toggleDD('dd-supplier','fp-supplier')">
        Supplier
        <span class="f-badge" id="fb-supplier" style="display:none"></span>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="dropdown" id="dd-supplier">
        <div class="dd-search">
          <input type="text" placeholder="Search suppliers..." oninput="ddSearch('dd-supplier',this.value)">
        </div>
        <div class="dd-actions">
          <button class="dd-act" onclick="selAll('supplier')">Clear</button>
        </div>
        <div class="dd-list" id="dl-supplier"></div>
      </div>
    </div>

    <!-- Category filter -->
    <div class="filter-wrap" id="fw-category">
      <button class="filter-pill" id="fp-category" onclick="toggleDD('dd-category','fp-category')">
        Category
        <span class="f-badge" id="fb-category" style="display:none"></span>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="dropdown" id="dd-category">
        <div class="dd-search">
          <input type="text" placeholder="Search categories..." oninput="ddSearch('dd-category',this.value)">
        </div>
        <div class="dd-actions">
          <button class="dd-act" onclick="selAll('category')">Clear</button>
        </div>
        <div class="dd-list" id="dl-category"></div>
      </div>
    </div>

    <!-- Sub category filter -->
    <div class="filter-wrap" id="fw-subcategory">
      <button class="filter-pill" id="fp-subcategory" onclick="toggleDD('dd-subcategory','fp-subcategory')">
        Sub Category
        <span class="f-badge" id="fb-subcategory" style="display:none"></span>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="dropdown" id="dd-subcategory">
        <div class="dd-search">
          <input type="text" placeholder="Search..." oninput="ddSearch('dd-subcategory',this.value)">
        </div>
        <div class="dd-actions">
          <button class="dd-act" onclick="selAll('subcategory')">Clear</button>
        </div>
        <div class="dd-list" id="dl-subcategory"></div>
      </div>
    </div>

    <!-- Sort -->
    <div class="filter-wrap" style="margin-left:auto">
      <button class="filter-pill" id="fp-sort" onclick="toggleDD('sort-panel','fp-sort')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="6" y1="12" x2="18" y2="12"/>
          <line x1="9" y1="18" x2="15" y2="18"/>
        </svg>
        Sort
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="sort-panel" id="sort-panel">
        <div class="sort-panel-title">Sort order</div>
        <div id="sort-rows"></div>
        <button class="add-sort" id="add-sort" onclick="addSort()">+ Add level</button>
      </div>
    </div>

  </div><!-- /toolbar -->

  <!-- Active filter tags -->
  <div id="tag-bar"></div>

  <!-- Results count -->
  <div class="results-bar" id="results-bar">Loading...</div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Supplier</th>
          <th>Product Name</th>
          <th>Code</th>
          <th>Price</th>
          <th>Pack Size</th>
          <th>Unit</th>
          <th>Unit Cost</th>
          <th>Last Update</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div id="empty">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No products found</p>
      <small>Try adjusting your search or filters</small>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <span class="version-badge" id="version-badge"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
